<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title{font-size:21px;font-weight:700;fill:#0f172a;}
      .cap{font-size:14px;font-weight:700;fill:#334155;}
      .sub{font-size:12px;fill:#64748b;}
      .mono{font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;fill:#1e3a8a;}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title and subtitle -->
  <text x="420" y="30" text-anchor="middle" class="title">The manifest: one table that points to every file</text>
  <text x="420" y="52" text-anchor="middle" class="sub">The CSV is the single source of truth linking images to metadata</text>

  <!-- LEFT: Manifest table -->
  <g transform="translate(40, 80)">
    <text x="0" y="-10" class="cap">Manifest CSV</text>

    <!-- Table background -->
    <rect x="0" y="0" width="340" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>

    <!-- Header row -->
    <rect x="10" y="10" width="80" height="30" rx="4" fill="#2563eb" opacity="0.1"/>
    <rect x="95" y="10" width="140" height="30" rx="4" fill="#2563eb" opacity="0.1"/>
    <rect x="240" y="10" width="50" height="30" rx="4" fill="#2563eb" opacity="0.1"/>
    <rect x="295" y="10" width="35" height="30" rx="4" fill="#2563eb" opacity="0.1"/>

    <text x="50" y="28" text-anchor="middle" class="mono">filename</text>
    <text x="165" y="28" text-anchor="middle" class="mono">caption</text>
    <text x="265" y="28" text-anchor="middle" class="mono">category</text>
    <text x="312" y="28" text-anchor="middle" class="mono">split</text>

    <!-- Row 1 -->
    <rect x="10" y="45" width="80" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="95" y="45" width="140" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="240" y="45" width="50" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="295" y="45" width="35" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <text x="50" y="60" text-anchor="middle" class="mono" font-size="10">galaxy_001</text>
    <text x="50" y="72" text-anchor="middle" class="mono" font-size="10">.png</text>
    <text x="165" y="60" text-anchor="middle" class="sub" font-size="9">Spiral galaxy with</text>
    <text x="165" y="72" text-anchor="middle" class="sub" font-size="9">bright core</text>
    <text x="265" y="66" text-anchor="middle" class="mono" font-size="10">astronomy</text>
    <text x="312" y="66" text-anchor="middle" class="mono" font-size="10">train</text>

    <!-- Row 2 -->
    <rect x="10" y="88" width="80" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="95" y="88" width="140" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="240" y="88" width="50" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="295" y="88" width="35" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <text x="50" y="103" text-anchor="middle" class="mono" font-size="10">cell_001</text>
    <text x="50" y="115" text-anchor="middle" class="mono" font-size="10">.png</text>
    <text x="165" y="109" text-anchor="middle" class="sub" font-size="9">Red blood cells</text>
    <text x="265" y="109" text-anchor="middle" class="mono" font-size="10">biology</text>
    <text x="312" y="109" text-anchor="middle" class="mono" font-size="10">train</text>

    <!-- Row 3 -->
    <rect x="10" y="131" width="80" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="95" y="131" width="140" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="240" y="131" width="50" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="295" y="131" width="35" height="38" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <text x="50" y="146" text-anchor="middle" class="mono" font-size="10">landscape</text>
    <text x="50" y="158" text-anchor="middle" class="mono" font-size="10">_001.png</text>
    <text x="165" y="152" text-anchor="middle" class="sub" font-size="9">Mountain range</text>
    <text x="265" y="152" text-anchor="middle" class="mono" font-size="10">geography</text>
    <text x="312" y="152" text-anchor="middle" class="mono" font-size="10">test</text>
  </g>

  <!-- RIGHT: Image files -->
  <g transform="translate(500, 80)">
    <text x="0" y="-10" class="cap">Image Files</text>

    <!-- Folder background -->
    <rect x="0" y="0" width="280" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>

    <!-- Image 1 -->
    <rect x="20" y="20" width="70" height="50" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <circle cx="40" cy="35" r="8" fill="#0d9488" opacity="0.4"/>
    <circle cx="55" cy="45" r="12" fill="#0d9488" opacity="0.3"/>
    <text x="55" y="80" text-anchor="middle" class="mono" font-size="9">galaxy_001</text>
    <text x="55" y="91" text-anchor="middle" class="mono" font-size="9">.png</text>

    <!-- Image 2 -->
    <rect x="105" y="20" width="70" height="50" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <circle cx="130" cy="35" r="5" fill="#db2777" opacity="0.5"/>
    <circle cx="145" cy="40" r="5" fill="#db2777" opacity="0.5"/>
    <circle cx="125" cy="48" r="5" fill="#db2777" opacity="0.5"/>
    <text x="140" y="80" text-anchor="middle" class="mono" font-size="9">cell_001</text>
    <text x="140" y="91" text-anchor="middle" class="mono" font-size="9">.png</text>

    <!-- Image 3 -->
    <rect x="190" y="20" width="70" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M200,50 L220,35 L240,40 L250,30" stroke="#2563eb" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M200,55 L260,55" stroke="#2563eb" stroke-width="1.5" fill="none" opacity="0.4"/>
    <text x="225" y="80" text-anchor="middle" class="mono" font-size="9">landscape</text>
    <text x="225" y="91" text-anchor="middle" class="mono" font-size="9">_001.png</text>
  </g>

  <!-- Arrows linking table rows to images -->
  <!-- Arrow 1: galaxy -->
  <path d="M 130,147 Q 300,130 490,115" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow 2: cell -->
  <path d="M 130,190 Q 340,165 590,115" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow 3: landscape -->
  <path d="M 130,233 Q 380,210 685,115" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="760" height="50" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="380" y="20" text-anchor="middle" class="sub" font-weight="600">Why use a manifest?</text>
    <text x="380" y="38" text-anchor="middle" class="sub">One CSV keeps all metadata organized. Code reads the table, not scattered folder names.</text>
  </g>
</svg>
