<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title{font-size:21px;font-weight:700;fill:#0f172a;}
      .cap{font-size:14px;font-weight:700;fill:#334155;}
      .sub{font-size:12px;fill:#64748b;}
      .mono{font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;fill:#1e3a8a;}
      .label{font-size:13px;fill:#334155;font-weight:600;}
      .tool{font-size:11px;fill:#64748b;font-style:italic;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="420" y="30" class="title" text-anchor="middle">From a CSV file to a training-ready batch</text>

  <!-- Stage 1: Manifest CSV -->
  <rect x="40" y="80" width="100" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="110" class="label" text-anchor="middle">Manifest</text>
  <text x="90" y="128" class="label" text-anchor="middle">CSV</text>
  <text x="90" y="145" class="tool" text-anchor="middle">file on disk</text>

  <!-- Arrow 1 to 2 -->
  <line x1="150" y1="115" x2="185" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Filter + clean rows -->
  <rect x="195" y="80" width="110" height="70" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="250" y="105" class="label" text-anchor="middle">Filter +</text>
  <text x="250" y="123" class="label" text-anchor="middle">clean rows</text>
  <text x="250" y="145" class="tool" text-anchor="middle">pandas</text>

  <!-- Arrow 2 to 3 -->
  <line x1="315" y1="115" x2="350" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Make a batch -->
  <rect x="360" y="80" width="100" height="70" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="410" y="105" class="label" text-anchor="middle">Make a</text>
  <text x="410" y="123" class="label" text-anchor="middle">batch</text>
  <text x="410" y="145" class="tool" text-anchor="middle">generator (yield)</text>

  <!-- Arrow 3 to 4 -->
  <line x1="470" y1="115" x2="505" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Load + resize image -->
  <rect x="515" y="80" width="110" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="570" y="105" class="label" text-anchor="middle">Load +</text>
  <text x="570" y="123" class="label" text-anchor="middle">resize image</text>
  <text x="570" y="145" class="tool" text-anchor="middle">OpenCV</text>

  <!-- Arrow 4 to 5 -->
  <line x1="635" y1="115" x2="670" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5: Normalize + stack -->
  <rect x="40" y="200" width="110" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="95" y="225" class="label" text-anchor="middle">Normalize +</text>
  <text x="95" y="243" class="label" text-anchor="middle">stack</text>
  <text x="95" y="265" class="tool" text-anchor="middle">NumPy</text>

  <!-- Arrow 5 to 6 -->
  <line x1="160" y1="235" x2="195" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 6: Final batch dict (highlighted) -->
  <rect x="205" y="200" width="160" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="285" y="223" class="label" text-anchor="middle">Batch dict</text>
  <text x="285" y="245" class="mono" text-anchor="middle" font-size="11">{images, texts,</text>
  <text x="285" y="262" class="mono" text-anchor="middle" font-size="11">metadata}</text>

  <!-- Arrow from stage 4 down to stage 5 -->
  <path d="M 570 160 L 570 180 L 95 180 L 95 190" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Flow description -->
  <text x="420" y="320" class="sub" text-anchor="middle">Each stage transforms the data until it is ready for the model.</text>
</svg>
