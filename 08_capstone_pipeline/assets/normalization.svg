<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title{font-size:21px;font-weight:700;fill:#0f172a;}
      .cap{font-size:14px;font-weight:700;fill:#334155;}
      .sub{font-size:12px;fill:#64748b;}
      .mono{font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;fill:#1e3a8a;}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#334155"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="420" y="40" text-anchor="middle" class="title">Normalizing: squeeze 0 to 255 down to 0.0 to 1.0</text>

  <!-- LEFT: uint8 range -->
  <g transform="translate(80, 100)">
    <text x="0" y="-10" class="cap">Before: uint8 (whole numbers)</text>

    <!-- Number line bar -->
    <rect x="0" y="20" width="280" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>

    <!-- Tick marks and labels -->
    <line x1="0" y1="70" x2="0" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" class="mono">0</text>

    <line x1="140" y1="70" x2="140" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="140" y="100" text-anchor="middle" class="mono">128</text>

    <line x1="280" y1="70" x2="280" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="280" y="100" text-anchor="middle" class="mono">255</text>

    <!-- Sample pixel values -->
    <circle cx="0" cy="40" r="6" fill="#2563eb"/>
    <circle cx="140" cy="40" r="6" fill="#2563eb"/>
    <circle cx="280" cy="40" r="6" fill="#2563eb"/>

    <text x="140" y="145" text-anchor="middle" class="sub">pixel values are 0 to 255</text>
  </g>

  <!-- Arrow with label -->
  <g transform="translate(380, 140)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <rect x="-30" y="-35" width="130" height="28" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="35" y="-13" text-anchor="middle" class="cap">divide by 255</text>
  </g>

  <!-- RIGHT: float32 range -->
  <g transform="translate(480, 100)">
    <text x="0" y="-10" class="cap">After: float32 (decimals)</text>

    <!-- Number line bar -->
    <rect x="0" y="20" width="280" height="40" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>

    <!-- Tick marks and labels -->
    <line x1="0" y1="70" x2="0" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" class="mono">0.0</text>

    <line x1="140" y1="70" x2="140" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="140" y="100" text-anchor="middle" class="mono">0.50</text>

    <line x1="280" y1="70" x2="280" y2="85" stroke="#cbd5e1" stroke-width="2"/>
    <text x="280" y="100" text-anchor="middle" class="mono">1.0</text>

    <!-- Sample normalized values -->
    <circle cx="0" cy="40" r="6" fill="#0d9488"/>
    <circle cx="140" cy="40" r="6" fill="#0d9488"/>
    <circle cx="280" cy="40" r="6" fill="#0d9488"/>

    <text x="140" y="145" text-anchor="middle" class="sub">normalized to 0.0 to 1.0</text>
  </g>

  <!-- Bottom explanation -->
  <g transform="translate(420, 280)">
    <rect x="-200" y="0" width="400" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" class="sub">Why normalize? Models train better on small</text>
    <text x="0" y="45" text-anchor="middle" class="sub">decimal ranges instead of large integers.</text>
  </g>
</svg>
